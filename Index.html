<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PUT AWAY SCANNER</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <style>
      body {
        background: #f4f6f9;
      }

      .card {
        border: none;
        border-radius: 16px;
      }

      #preview {
        width: 100%;
        min-height: 280px;
        background: #000;
        border-radius: 12px;
      }

      #loadingOverlay {
        position: fixed;
        inset: 0;
        background: rgba(255, 255, 255, 0.8);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
      }

      .scan-success {
        border: 3px solid #198754 !important;
      }
    </style>
  </head>

  <body>
    <div id="loadingOverlay">
      <div class="spinner-border"></div>
    </div>

    <div class="container py-3">
      ```
      <div class="card shadow p-3">
        <h3 class="text-center mb-3">PUT AWAY SCANNER</h3>

        <div class="mb-3">
          <label class="form-label"> SJ </label>

          <select id="sj" class="form-select">
            <option>Loading...</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label"> LOCATION </label>

          <select id="location" class="form-select"></select>
        </div>

        <div class="mb-3">
          <label class="form-label"> CAMERA SCANNER </label>

          <video id="preview"></video>
        </div>

        <div class="mb-3">
          <label class="form-label"> UPLOAD BARCODE IMAGE </label>

          <input
            type="file"
            id="barcodeImage"
            class="form-control"
            accept="image/*"
          />
        </div>

        <div class="mb-3">
          <label class="form-label"> BARCODE </label>

          <input
            type="text"
            id="barcode"
            class="form-control"
            autocomplete="off"
            placeholder="Scan barcode"
          />
        </div>

        <button id="btnSubmit" class="btn btn-success w-100">SUBMIT</button>

        <div class="alert alert-info mt-3 mb-0">
          <strong> Last Success Timestamp </strong>

          <div id="lastTimestamp">-</div>
        </div>
      </div>
      ```
    </div>

    <script>
      const API_URL =
        "https://script.google.com/macros/s/AKfycbxtja4DDUdMBdNoXAWoQa2EPSidP5JUeK6dWdaBpwmniet5Qh3z3161eRc7s74LVOzi/exec";

      const LOCATIONS = [
        "SPR-AA-",
        "SPR-AB-",
        "SPR-AC-",
        "SPR-AD-",
        "SPR-AE-",
        "SPR-AF-",
        "SPR-AG-",
        "SPR-AH-",
        "SPR-AI-",
        "SPR-AJ-",
        "SPR-AK-",
        "SPR-AL-",
        "SPR-AM-",
        "SPR-AN-",
      ];

      let codeReader = null;
      let submitting = false;
      let lastScan = "";

      window.onload = async () => {
        loadLocations();

        await loadSJ();

        await startScanner();

        document
          .getElementById("barcodeImage")
          .addEventListener("change", decodeBarcodeImage);

        document
          .getElementById("btnSubmit")
          .addEventListener("click", submitData);

        document.getElementById("barcode").focus();
      };

      function showLoading(show) {
        document.getElementById("loadingOverlay").style.display = show
          ? "flex"
          : "none";
      }

      function loadLocations() {
        const select = document.getElementById("location");

        select.innerHTML = "";

        LOCATIONS.forEach((loc) => {
          const option = document.createElement("option");

          option.value = loc;
          option.textContent = loc;

          select.appendChild(option);
        });
      }

      async function loadSJ() {
        try {
          showLoading(true);

          const response = await fetch(`${API_URL}?action=sj`);

          const result = await response.json();

          const select = document.getElementById("sj");

          select.innerHTML = "<option value=''>Pilih SJ</option>";

          if (result.success && Array.isArray(result.data)) {
            result.data.forEach((item) => {
              const option = document.createElement("option");

              option.value = item;

              option.textContent = item;

              select.appendChild(option);
            });
          }
        } catch (err) {
          console.error(err);

          alert("Gagal mengambil SJ.");
        } finally {
          showLoading(false);
        }
      }

      async function submitData() {
        if (submitting) {
          return;
        }

        const sj = document.getElementById("sj").value;

        const location = document.getElementById("location").value;

        const barcode = document.getElementById("barcode").value.trim();

        if (!sj || !location || !barcode) {
          alert("Lengkapi data terlebih dahulu.");
          return;
        }

        try {
          submitting = true;

          showLoading(true);

          const response = await fetch(API_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              action: "save",
              sj,
              location,
              barcode,
            }),
          });

          const result = await response.json();

          if (!result.success) {
            alert(result.message);

            return;
          }

          document.getElementById("lastTimestamp").innerText = result.timestamp;

          document.getElementById("barcode").value = "";

          document.getElementById("barcode").focus();

          if (navigator.vibrate) {
            navigator.vibrate([100, 50, 100]);
          }

          alert(result.message);
        } catch (err) {
          console.error(err);

          alert("Gagal menyimpan data.");
        } finally {
          submitting = false;

          showLoading(false);
        }
      }

      async function startScanner() {
        try {
          codeReader = new ZXing.BrowserMultiFormatReader();

          const devices = await codeReader.listVideoInputDevices();

          if (!devices || !devices.length) {
            return;
          }

          let selected = devices[0];

          const backCamera = devices.find((d) =>
            d.label.toLowerCase().includes("back"),
          );

          if (backCamera) {
            selected = backCamera;
          }

          codeReader.decodeFromVideoDevice(
            selected.deviceId,
            "preview",
            (result, err) => {
              if (!result) {
                return;
              }

              const barcode = result.text;

              if (barcode === lastScan) {
                return;
              }

              lastScan = barcode;

              const input = document.getElementById("barcode");

              input.value = barcode;

              input.classList.add("scan-success");

              setTimeout(() => {
                input.classList.remove("scan-success");
              }, 500);

              if (navigator.vibrate) {
                navigator.vibrate(150);
              }
            },
          );
        } catch (err) {
          console.error(err);
        }
      }

      async function decodeBarcodeImage(event) {
        const file = event.target.files[0];

        if (!file) {
          return;
        }

        try {
          showLoading(true);

          const img = document.createElement("img");

          img.src = URL.createObjectURL(file);

          await img.decode();

          const reader = new ZXing.BrowserMultiFormatReader();

          const result = await reader.decodeFromImageElement(img);

          document.getElementById("barcode").value = result.text;

          if (navigator.vibrate) {
            navigator.vibrate(150);
          }

          alert("Barcode berhasil dibaca.");
        } catch (err) {
          console.error(err);

          alert("Barcode tidak dapat dibaca.");
        } finally {
          document.getElementById("barcodeImage").value = "";

          showLoading(false);
        }
      }

      window.addEventListener("beforeunload", () => {
        if (codeReader) {
          codeReader.reset();
        }
      });
    </script>
  </body>
</html>
