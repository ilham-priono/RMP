<!doctype html>
<html>
  <head>
    <base target="_top" />

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        text-align: center;
        background: #f5f5f5;
      }

      h2 {
        margin-bottom: 10px;
      }

      #reader {
        width: 100%;
        max-width: 500px;
        margin: auto;
      }

      #result {
        margin-top: 20px;
        padding: 15px;
        background: white;
        border-radius: 10px;
        font-size: 20px;
        font-weight: bold;
      }

      .success {
        color: green;
      }
    </style>
  </head>

  <body>
    <h2>📷 Barcode Scanner</h2>

    <div id="reader"></div>

    <div id="result">Arahkan kamera ke barcode</div>

    <script>
      let lastScan = "";

      function onScanSuccess(decodedText) {
        if (lastScan === decodedText) return;

        lastScan = decodedText;

        document.getElementById("result").innerHTML =
          "Barcode : <span class='success'>" + decodedText + "</span>";

        fetch(
          "https://script.google.com/macros/s/AKfycbyjRmnhVktQbubmisL9eXVohrG6J70bdo-hJ43CUj6iQwrC64IMVhuqkigkjYGCIvlO/exec",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              barcode: decodedText,
            }),
          },
        )
          .then((res) => res.json())
          .then((data) => console.log(data))
          .catch((err) => console.error(err));

        setTimeout(() => {
          lastScan = "";
        }, 1500);
      }
    </script>
  </body>
</html>
